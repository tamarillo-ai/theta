name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10

jobs:
  build:
    name: "build ${{ matrix.target }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: install rust toolchain
        shell: bash
        run: |
          rustup set profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: install cross
        if: matrix.cross
        run: cargo install --locked cross

      - name: build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }} -p theta-cli --bin theta
          else
            cargo build --release --locked --target ${{ matrix.target }} -p theta-cli --bin theta
          fi

      - name: pack (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          archive="theta-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C target/${{ matrix.target }}/release theta
          shasum -a 256 "$archive" > "$archive.sha256"

      - name: pack (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          archive="theta-${{ matrix.target }}.zip"
          7z a "$archive" ./target/${{ matrix.target }}/release/theta.exe
          sha256sum "$archive" > "$archive.sha256"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            theta-${{ matrix.target }}.*

  publish:
    name: "publish github release"
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-*
          merge-multiple: true

      - name: create github release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          shopt -s nullglob
          files=( theta-*.tar.gz theta-*.tar.gz.sha256 theta-*.zip theta-*.zip.sha256 )
          if [ ${#files[@]} -eq 0 ]; then
            echo "no release artifacts found" >&2
            exit 1
          fi
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes \
            "${files[@]}"
