- `.codex/harness/schemas/verification_report.schema.json`

[产出]
- `critique_report`
- `gate_result` 的审查意见
- 剩余风险与放行条件

[硬约束]
- 阻断项未闭环不得建议放行
- 缺少验证证据时不得给出通过结论
