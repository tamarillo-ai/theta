# Codex CLI configuration — Azure OpenAI (personal)
# Install: ./install.sh --personal --azure
# Manual: cp to ~/.codex/config.toml

model = "gpt-5.5"
model_provider = "azure"
model_reasoning_effort = "xhigh"
sandbox = "danger-full-access"
approval_policy = "never"

[model_providers.azure]
name = "Azure OpenAI"
base_url = "https://<your-resource-name>.openai.azure.com/openai/v1"
env_key = "AZURE_OPENAI_API_KEY"
wire_api = "responses"

[env]
DISABLE_TELEMETRY = "1"

[features]
multi_agent = true
codex_hooks = true

[agents]
max_threads = 6
max_depth = 1

[tui]
status_line = ["model-with-reasoning", "git-branch", "context-remaining", "used-tokens"]

# MCP: frontend testing
[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]
