model = "gpt-5.5"
sandbox_mode = "workspace-write"
personality = "pragmatic"

[features]
multi_agent = true
shell_snapshot = true

[mcp_servers.fetch]
command = "uvx"
args = ["mcp-fetch"]

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"
bearer_token_env_var = "NOTION_TOKEN"
scopes = ["read"]

[profiles.deep-review]
model_reasoning_effort = "high"
