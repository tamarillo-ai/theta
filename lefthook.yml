pre-commit:
  parallel: true
  jobs:
    - name: format
      run: cargo fmt --all --check
    - name: clippy
      run: cargo clippy --workspace --all-targets --locked -- -D warnings
    - name: typos
      run: typos
    - name: unused-deps
      run: cargo shear
    - name: cli-docs
      run: cargo run -p theta-args --features docgen --example gen_cli_reference 2>/dev/null | diff -u docs/reference/cli.md -

pre-push:
  parallel: true
  jobs:
    - name: test
      run: cargo nextest run --workspace --locked --features online-tests
    - name: deny
      run: cargo deny check advisories licenses sources
